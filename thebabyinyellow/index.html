<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">

            font-family: selectric;
            src: url(fonts/selectric/SLC_.ttf);

        .lock {
            padding: 0;

            width: 150px;
            height: 150px;
            background: white;
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-right: -50%;
            transform: translate(-50%, -50%)
        }

        img {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            touch-action: none;

        }
